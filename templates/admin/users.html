{% extends "base.html" %}

{% block content %}

<h2>User Details</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Email</th>
        <th>Role</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user[0] }}</td>
        <td>{{ user[1] }}</td>
        <td>{{ user[2] }}</td>
        <td>{{ user[4] }}</td>
    </tr>
    {% endfor %}
</table>

<a href="{{ url_for('admin_dashboard') }}">Back</a>

{% endblock %}
