{% extends "base.html" %}

{% block content %}
<section class="dashboard-shell">
    <div class="panel panel-grid">
        <div>
            <h2>Create Invoice</h2>
            <p>Record a new invoice for your customers.</p>
        </div>
        <a href="{{ url_for('admin_dashboard') }}" class="button secondary">Back to Dashboard</a>
    </div>

    <form method="POST" action="{{ url_for('admin_create') }}" class="form-grid wide-grid">
        <input type="text" name="customer" placeholder="Customer Name" required>
        <input type="text" name="product" placeholder="Product or Service" required>
        <input type="number" name="quantity" placeholder="Quantity" min="1" required>
        <input type="number" name="price" placeholder="Unit Price" step="0.01" min="0" required>
        <button type="submit">Save Invoice</button>
    </form>
</section>
{% endblock %}
