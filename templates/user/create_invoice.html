{% extends "base.html" %}

{% block content %}
<section class="dashboard-shell">
    <div class="panel panel-grid">
        <div>
            <h2>Create New Invoice</h2>
            <p>Fill in the details and generate a professional invoice.</p>
        </div>
        <div class="card summary-card">
            <span class="label">Signed in as</span>
            <strong>{{ session.get('username') }}</strong>
        </div>
    </div>

    <form method="POST" action="{{ url_for('generate_invoice') }}" class="form-grid wide-grid">
        <input type="text" name="customer" placeholder="Customer Name" required>
        <input type="text" name="product" placeholder="Product / Service" required>
        <input type="number" name="quantity" placeholder="Quantity" min="1" required>
        <input type="number" name="price" placeholder="Unit Price" step="0.01" min="0" required>
        <button type="submit" class="button full">Generate Invoice</button>
    </form>
</section>
{% endblock %}
