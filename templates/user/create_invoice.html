{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2>Create New Invoice</h2>
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label for="customer">Customer Name *</label>
                <input type="text" id="customer" name="customer" placeholder="Enter customer name" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="product_id">Product *</label>
                <select id="product_id" name="product_id" required>
                    <option value="">Select a product...</option>
                    {% for product in products %}
                    <option value="{{ product['id'] }}">{{ product['name'] }} - Rs. {{ "%.2f"|format(product['price']) }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-row two-col">
            <div class="form-group">
                <label for="quantity">Quantity *</label>
                <input type="number" id="quantity" name="quantity" min="1" placeholder="0" required>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="button">Create Invoice</button>
            <a href="{{ url_for('user_dashboard') }}" class="button secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
