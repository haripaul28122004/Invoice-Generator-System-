{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2>Create New Invoice</h2>
    <form method="POST">
        <!-- Customer Details -->
        <div class="form-row two-col">
            <div class="form-group">
                <label for="customer">Customer Name *</label>
                <input type="text" id="customer" name="customer"
                       placeholder="Enter customer name" required>
            </div>
            <div class="form-group">
                <label for="customer_email">Customer Email *</label>
                <input type="email" id="customer_email" name="customer_email"
                       placeholder="Enter customer email" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="customer_address">Customer Address *</label>
                <textarea id="customer_address" name="customer_address"
                          placeholder="Enter customer address" rows="2" required
                          style="resize:vertical;width:100%;"></textarea>
            </div>
        </div>

        <!-- Category Filter -->
        <div class="form-row">
            <div class="form-group">
                <label for="categoryFilter">Filter by Category</label>
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    {% set categories = [] %}
                    {% for product in products %}
                        {% if product['category'] not in categories %}
                            {% set _ = categories.append(product['category']) %}
                            <option value="{{ product['category'] }}">{{ product['category'] }}</option>
                        {% endif %}
                    {% endfor %}
                </select>
            </div>
        </div>

        <!-- Search Product -->
        <div class="form-row">
            <div class="form-group">
                <label for="searchProduct">Search Product</label>
                <input type="text" id="searchProduct" placeholder="Search by name, category, or price...">
            </div>
        </div>

        <!-- Product Selection -->
        <div class="form-row">
            <div class="form-group">
                <label for="product_id">Select Product *</label>
                <select id="product_id" name="product_id" required>
                    <option value="">Select a product...</option>
                    {% for product in products %}
                    <option value="{{ product['id'] }}"
                        data-name="{{ product['name'] }}"
                        data-category="{{ product['category'] }}"
                        data-price="{{ product['price'] }}"
                        data-gst="{{ product['gst'] or 0.18 }}"
                        data-stock="{{ product['stock'] or 0 }}"
                        {% if (product['stock'] or 0) == 0 %}disabled{% endif %}>
                        {{ product['name'] }} ({{ product['category'] }}) - ₹{{ "%.2f"|format(product['price']) }} | Stock: {{ product['stock'] or 0 }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <!-- Stock Info Display -->
        <div class="form-row">
            <div class="form-group" id="stockInfoContainer" style="display:none;">
                <label for="stockInfo">Available Stock</label>
                <input type="text" id="stockInfo" readonly placeholder="Select a product" style="background: #f3f4f6;">
            </div>
        </div>

        <div class="form-row two-col">
            <div class="form-group">
                <label for="quantity">Quantity *</label>
                <input type="number" id="quantity" name="quantity" min="1" placeholder="0" required oninput="calculateTax()">
            </div>
            <div class="form-group">
                <label for="price">Unit Price (₹)</label>
                <input type="text" id="price" name="price" readonly placeholder="0.00" style="background: #f3f4f6;">
            </div>
        </div>

        <!-- Real-time Tax Calculator Display -->
        <div class="tax-summary" id="taxSummary" style="display: none;">
            <div class="tax-row header">
                <span>SUBTOTAL</span>
                <span>₹ <span id="subtotalValue">0.00</span></span>
            </div>
            <div class="tax-row">
                <span>GST (<span id="gstRate">18</span>%)</span>
                <span>₹ <span id="taxValue">0.00</span></span>
            </div>
            <div class="tax-row total">
                <span>FINAL TOTAL</span>
                <span>₹ <span id="finalTotalValue">0.00</span></span>
            </div>
        </div>

        <!-- Stock Warning -->
        <div id="stockWarning" class="flash danger" style="display: none; margin-top: 1rem;">
            ⚠️ Quantity exceeds available stock!
        </div>

        <div class="form-actions">
            <button type="submit" class="button">Create Invoice</button>
            <a href="{{ url_for('user_dashboard') }}" class="button secondary">Cancel</a>
        </div>
    </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // ── Data ──────────────────────────────────────────────────────
    const productsData = JSON.parse('{{ products | tojson | safe }}');
    console.log("Products loaded:", productsData.length);

    // ── DOM refs ──────────────────────────────────────────────────
    const productSelect      = document.getElementById('product_id');
    const quantityInput      = document.getElementById('quantity');
    const priceInput         = document.getElementById('price');
    const taxSummary         = document.getElementById('taxSummary');
    const searchInput        = document.getElementById('searchProduct');
    const categoryFilter     = document.getElementById('categoryFilter');
    const stockInfoContainer = document.getElementById('stockInfoContainer');
    const stockInfo          = document.getElementById('stockInfo');
    const stockWarning       = document.getElementById('stockWarning');

    if (!productSelect) return; // safety guard

    let currentGST   = 0.18;
    let currentStock = 0;

    // ── Rebuild product dropdown from filtered array ───────────────
    function updateProductDropdown(filtered) {
        const prev = productSelect.value; // keep selection if still valid
        productSelect.innerHTML = '<option value="">Select a product...</option>';

        filtered.forEach(function (p) {
            const opt = document.createElement('option');
            opt.value            = p.id;
            opt.dataset.name     = p.name;
            opt.dataset.category = p.category;
            opt.dataset.price    = p.price;
            opt.dataset.gst      = p.gst || 0.18;
            opt.dataset.stock    = p.stock || 0;
            opt.disabled         = (p.stock || 0) === 0;
            opt.textContent      = p.name + ' (' + p.category + ') - ₹' +
                                   parseFloat(p.price).toFixed(2) +
                                   ' | Stock: ' + (p.stock || 0);
            if (String(p.id) === prev) opt.selected = true;
            productSelect.appendChild(opt);
        });

        // Reset price/GST if selected product is no longer in list
        if (!productSelect.value) {
            priceInput.value = '';
            taxSummary.style.display = 'none';
            stockInfoContainer.style.display = 'none';
            currentGST = 0.18;
            currentStock = 0;
        }
    }

    // ── Apply both search + category filters ──────────────────────
    function applyFilters() {
        const searchVal  = searchInput.value.trim().toLowerCase();
        const catVal     = categoryFilter.value.toLowerCase();

        const filtered = productsData.filter(function (p) {
            const matchesCat    = catVal === '' || p.category.toLowerCase() === catVal;
            const matchesSearch = searchVal === '' ||
                                  p.name.toLowerCase().includes(searchVal) ||
                                  p.category.toLowerCase().includes(searchVal);
            return matchesCat && matchesSearch;
        });

        updateProductDropdown(filtered);
    }

    // ── Update price + GST when product selected ──────────────────
    function updatePriceAndGST() {
        const selected = productSelect.options[productSelect.selectedIndex];
        if (selected && selected.value) {
            const price  = parseFloat(selected.dataset.price) || 0;
            currentGST   = parseFloat(selected.dataset.gst)   || 0.18;
            currentStock = parseInt(selected.dataset.stock)    || 0;

            priceInput.value = price.toFixed(2);
            stockInfo.value  = currentStock + ' units';
            stockInfoContainer.style.display = 'block';

            console.log('Product:', selected.textContent.trim(),
                        '| Price:', price, '| GST:', currentGST, '| Stock:', currentStock);

            calculateTax();
        } else {
            priceInput.value = '';
            stockInfoContainer.style.display = 'none';
            taxSummary.style.display = 'none';
        }
    }

    // ── Real-time tax calculator ───────────────────────────────────
    function calculateTax() {
        const quantity = parseInt(quantityInput.value) || 0;
        const price    = parseFloat(priceInput.value)  || 0;

        stockWarning.style.display =
            (quantity > currentStock && currentStock > 0) ? 'block' : 'none';

        if (quantity <= 0 || price <= 0) {
            taxSummary.style.display = 'none';
            return;
        }

        const subtotal   = quantity * price;
        const tax        = subtotal * currentGST;
        const finalTotal = subtotal + tax;

        document.getElementById('subtotalValue').textContent   = subtotal.toFixed(2);
        document.getElementById('taxValue').textContent        = tax.toFixed(2);
        document.getElementById('gstRate').textContent         = (currentGST * 100).toFixed(0);
        document.getElementById('finalTotalValue').textContent = finalTotal.toFixed(2);

        taxSummary.style.display = 'block';
    }

    // ── Event listeners ───────────────────────────────────────────
    productSelect.addEventListener('change',  updatePriceAndGST);
    quantityInput.addEventListener('input',   calculateTax);
    searchInput.addEventListener('input',     applyFilters);
    categoryFilter.addEventListener('change', applyFilters);

}); // end DOMContentLoaded
</script>
{% endblock %}
