{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2>Create New Invoice</h2>
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label for="customer">Customer Name *</label>
                <input type="text" id="customer" name="customer" placeholder="Enter customer name" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="product_id">Product *</label>
                <select id="product_id" name="product_id" required onchange="updatePriceAndGST()">
                    <option value="">Select a product...</option>
                    {% for product in products %}
                    <option value="{{ product['id'] }}" data-price="{{ product['price'] }}" data-gst="{{ product['gst'] or 0.18 }}">
                        {{ product['name'] }} - Rs. {{ "%.2f"|format(product['price']) }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="quantity">Quantity *</label>
                <input type="number" id="quantity" name="quantity" min="1" placeholder="0" required oninput="calculateTax()">
            </div>
        </div>

        <!-- Real-time Tax Calculator Display -->
        <div class="tax-summary" id="taxSummary" style="display: none;">
            <div class="tax-row header">
                <span>SUBTOTAL</span>
                <span>Rs. <span id="subtotalValue">0.00</span></span>
            </div>
            <div class="tax-row">
                <span>GST (<span id="gstRate">18</span>%)</span>
                <span>Rs. <span id="taxValue">0.00</span></span>
            </div>
            <div class="tax-row total">
                <span>FINAL TOTAL</span>
                <span>Rs. <span id="finalTotalValue">0.00</span></span>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="button">Create Invoice</button>
            <a href="{{ url_for('user_dashboard') }}" class="button secondary">Cancel</a>
        </div>
    </form>
</div>

<script>
    const productSelect = document.getElementById('product_id');
    const quantityInput = document.getElementById('quantity');
    const taxSummary = document.getElementById('taxSummary');
    let currentPrice = 0;
    let currentGST = 0.18;

    function updatePriceAndGST() {
        const selectedOption = productSelect.options[productSelect.selectedIndex];
        if (selectedOption.value) {
            currentPrice = parseFloat(selectedOption.dataset.price) || 0;
            currentGST = parseFloat(selectedOption.dataset.gst) || 0.18;
            calculateTax();
        } else {
            taxSummary.style.display = 'none';
        }
    }

    function calculateTax() {
        const quantity = parseInt(quantityInput.value) || 0;

        if (quantity <= 0 || currentPrice <= 0) {
            taxSummary.style.display = 'none';
            return;
        }

        const subtotal = quantity * currentPrice;
        const tax = subtotal * currentGST;
        const finalTotal = subtotal + tax;

        document.getElementById('subtotalValue').textContent = subtotal.toFixed(2);
        document.getElementById('taxValue').textContent = tax.toFixed(2);
        document.getElementById('gstRate').textContent = (currentGST * 100).toFixed(0);
        document.getElementById('finalTotalValue').textContent = finalTotal.toFixed(2);

        taxSummary.style.display = 'block';
    }
</script>
{% endblock %}
    </form>
</div>

<script>
    const productSelect = document.getElementById('product_id');
    const quantityInput = document.getElementById('quantity');
    const taxSummary = document.getElementById('taxSummary');

    function updatePrice() {
        calculateTax();
    }

    function calculateTax() {
        const productId = productSelect.value;
        const quantity = parseInt(quantityInput.value) || 0;

        if (!productId || quantity <= 0) {
            taxSummary.style.display = 'none';
            return;
        }

        // Get the price from the selected option
        const selectedOption = productSelect.options[productSelect.selectedIndex];
        const price = parseFloat(selectedOption.getAttribute('data-price')) || 0;

        // Calculate subtotal
        const subtotal = price * quantity;

        // Calculate tax (18% GST)
        const tax = subtotal * 0.18;
        const finalTotal = subtotal + tax;

        // Update display
        document.getElementById('subtotalValue').textContent = subtotal.toFixed(2);
        document.getElementById('taxValue').textContent = tax.toFixed(2);
        document.getElementById('finalTotalValue').textContent = finalTotal.toFixed(2);

        // Show tax summary
        taxSummary.style.display = 'block';
    }
</script>
{% endblock %}
