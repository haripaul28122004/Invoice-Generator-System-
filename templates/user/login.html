{% extends "base.html" %}

{% block content %}
<section class="login-container">
    <div class="login-image">
        <div class="image-overlay"></div>
        <div class="image-content">
            <h1>Welcome Back</h1>
            <p>Access your invoice dashboard</p>
        </div>
    </div>
    <div class="login-form-container">
        <div class="login-card">
            <div class="auth-header">
                <h1>User Login</h1>
                <p>Sign in with your user account to view invoices.</p>
            </div>

            <form method="POST" action="{{ url_for('user_login') }}" class="form-grid">
                <div class="input-box">
                    <span class="icon">📧</span>
                    <input type="email" name="email" placeholder="Email address" autocomplete="email" required>
                </div>
                <div class="input-box">
                    <span class="icon">🔒</span>
                    <input type="password" name="password" placeholder="Password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
            <div class="notice">
                Don&apos;t have an account? <a href="{{ url_for('register') }}">Register here</a>.
            </div>
        </div>
    </div>
</section>
{% endblock %}
