{% extends "base.html" %}

{% block content %}
<div class="login-image">
    <div style="text-align: center; color: white; z-index: 10; position: relative;">
        <h2 style="font-size: 2rem; margin-bottom: 1rem;">InvoiceFlow</h2>
        <p style="font-size: 1.1rem; opacity: 0.9;">Employee Portal</p>
    </div>
</div>

<div class="login-content">
    <div class="login-form">
        <h2>Employee Login</h2>
        <form method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="button full-width">Login</button>
        </form>
    </div>
</div>
{% endblock %}
