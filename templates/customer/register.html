{% extends "base.html" %}

{% block content %}
<div class="login-content">
    <div class="login-form">
        <h2>Customer Registration</h2>
        <form method="POST">
            <div class="form-group">
                <label for="username">Full Name</label>
                <input type="text" id="username" name="username" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="button full-width">Register</button>
        </form>
        <p class="text-center mt-3">
            Already have an account? <a href="{{ url_for('customer_login') }}" class="button secondary mini">Login Here</a>
        </p>
    </div>
</div>
{% endblock %}
